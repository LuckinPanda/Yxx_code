seed: 42

data:
  mode: source_low_only
  source_low_dir: /home/yannayanna/datasets/LOL/our485/low
  source_high_dir: null
  target_low_dir: null
  resize: null           # Original 600x400; was [960,640] = 2.56x upsampling waste
  num_workers: 4

train:
  batch_size: 4
  epochs: 30
  lr: 0.0001
  log_interval: 50
  mask_prob: 0.3
  save_dir: checkpoints
  save_name: denoise_pre_ckpt.pth
  # Loss weights (v2: Noise2Self-style)
  lambda_delta: 0.05     # mild delta regularization (lowered from 0.15)
  lambda_tv: 0.05        # TV smoothness on R_e (replaces gradient_loss)
  lambda_cb: 0.1         # channel balance prior (replaces color_consistency)

model:
  illumination_channels: 32
  adarenet_channels: 32

constants:
  # Must be consistent across training and inference
  omega: 15.0
  tau: 0.1
  eps: 0.000001
  illum_adjust_mode: gamma
  pref_max: 3.0
  guided_filter_radius: 3
  guided_filter_eps: 0.02

noise:
  sigma_min: 0.01
  sigma_max: 0.05

ckpt:
  illum_ckpt_path: checkpoints/illum_ckpt.pth
