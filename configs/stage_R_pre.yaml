seed: 42

data:
  mode: source_low_only
  source_low_dir: /home/yannayanna/datasets/LOL/our485/low
  source_high_dir: null
  target_low_dir: null
  resize: null           # Original 600x400; was [960,640] = 2.56x upsampling waste
  num_workers: 4

train:
  batch_size: 4
  epochs: 40
  lr: 0.0001
  log_interval: 50
  mask_prob: 0.2
  full_input_ratio: 0.5   # same as baseline
  save_dir: checkpoints
  save_name: denoise_pre_ckpt.pth
  use_cosine_lr: false    # constant lr works better for this task size
  augment: true           # random flip augmentation (rotation redundant with RotEqBlock)
  # Loss weights
  lambda_delta: 0.15     # delta regularization
  lambda_grad: 0.1       # gradient preservation
  lambda_color: 0.5      # color consistency (restored to baseline)

model:
  illumination_channels: 32
  adarenet_channels: 32

constants:
  # Must be consistent across training and inference
  omega: 15.0
  tau: 0.1
  eps: 0.000001
  illum_adjust_mode: gamma
  pref_max: 5.0

noise:
  sigma_min: 0.01
  sigma_max: 0.05

ckpt:
  illum_ckpt_path: checkpoints/illum_ckpt.pth
