# Stage-R-pre V7 配置
# 原始AdaReNet架构 + SSIM损失

seed: 42

constants:
  omega: 1.0
  tau: 0.1
  eps: 1.0e-6
  illum_adjust_mode: gamma
  pref_max: 5.0

noise:
  sigma_min: 0.01
  sigma_max: 0.05

data:
  mode: source_low_only
  source_low_dir: /home/yannayanna/datasets/LOL/our485/low
  source_high_dir: null
  target_low_dir: null
  resize: null
  num_workers: 4

model:
  illumination_channels: 32
  adarenet_channels: 32  # 原始AdaReNet

ckpt:
  illum_ckpt_path: checkpoints/illum_ckpt.pth

train:
  epochs: 30
  batch_size: 8
  lr: 0.0002            # 原始学习率
  mask_prob: 0.2
  log_interval: 50
  save_interval: 5
  save_dir: checkpoints
  save_name: denoise_pre_ckpt.pth

  # 损失权重 - 轻量SSIM
  lambda_ssim: 0.15     # SSIM损失权重
  lambda_grad: 0.1      # 梯度损失权重
  lambda_color: 0.5     # 颜色一致性
  lambda_delta: 0.15    # delta正则化

  # Warmup
  warmup_epochs: 3
